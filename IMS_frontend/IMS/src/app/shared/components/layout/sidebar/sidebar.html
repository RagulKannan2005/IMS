<aside class="sidebar">
  <!-- Sidebar Header: Branding -->
  <div class="sidebar-header">
    <!-- Box Logo SVG -->
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" style="width: 28px; height: 28px; color: var(--accent-primary);">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
      <line x1="12" y1="22.08" x2="12" y2="12"/>
    </svg>
    <span class="logo-text">IMS Portal</span>
  </div>

  <!-- Sidebar Menu List -->
  <ul class="sidebar-menu">
    @for (item of menuItems(); track item.route) {
      <li>
        <a 
          [routerLink]="item.route" 
          routerLinkActive="active" 
          [routerLinkActiveOptions]="{exact: true}"
          class="menu-item-link">
          <span [innerHTML]="getSafeSvg(item.icon)" style="display: flex; align-items: center; justify-content: center;"></span>
          <span>{{ item.label }}</span>
        </a>
      </li>
    }
  </ul>

  <!-- Sidebar Footer: Session Info -->
  <div class="sidebar-footer">
    <div style="display: flex; align-items: center; gap: 10px;">
      <div style="width: 8px; height: 8px; border-radius: 50%; background-color: var(--success);"></div>
      <span style="font-size: 11px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase;">
        {{ authService.userRole() }} Mode
      </span>
    </div>
  </div>
</aside>
