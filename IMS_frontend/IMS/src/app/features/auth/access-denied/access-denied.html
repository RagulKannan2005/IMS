<div class="access-denied-container">
  <div class="access-denied-card fade-in">
    <!-- Pulsing Lock Shield SVG -->
    <div class="icon-wrapper">
      <svg class="shield-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        <path class="lock-body" d="M10 11h4a1 1 0 0 1 1 1v3a1 1 0 0 1-1 1h-4a1 1 0 0 1-1-1v-3a1 1 0 0 1 1-1z" />
        <path class="lock-shackle" d="M11 11V9a1 1 0 0 1 2 0v2" />
      </svg>
    </div>

    <h1>403</h1>
    <h2>Access Denied</h2>
    
    <p class="description">
      You do not have the required permissions to access this page. This resource is restricted based on your role privileges.
    </p>

    @if (authService.currentUser(); as user) {
      <div class="user-info-box">
        <div class="info-row">
          <span class="label">Current User:</span>
          <span class="value">{{ user.firstName }} {{ user.lastName }}</span>
        </div>
        <div class="info-row">
          <span class="label">Email:</span>
          <span class="value">{{ user.email }}</span>
        </div>
        <div class="info-row">
          <span class="label">Assigned Role:</span>
          <span class="value role-badge">{{ user.role }}</span>
        </div>
      </div>
    }

    <button class="back-btn" (click)="goHome()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>
      </svg>
      <span>Back to Dashboard</span>
    </button>
  </div>
</div>
